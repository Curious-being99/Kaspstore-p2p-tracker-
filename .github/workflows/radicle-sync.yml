- name: Restore Machine Identity
  env:
    RAD_HOME_TAR: ${{ secrets.RAD_HOME_TAR }}
  run: |
    # Strip any whitespace GitHub might inject, then decode
    echo "$RAD_HOME_TAR" | tr -d ' \n\r' | base64 -d | tar -xz -C "$HOME"
    # Tell subsequent steps where the identity lives
    echo "RAD_HOME=$HOME/.radicle_ci" >> $GITHUB_ENV

- name: Push to Radicle
  env:
    RAD_PASSPHRASE: ${{ secrets.RAD_PASSPHRASE }}
  run: |
    rad node start &
    sleep 5
    rad push --all --seed seed.radicle.garden
    rad sync rad:z2sjHzPsk9wmmpPm1F93tYT38yeYK --announce
