name: Radicle Cloud Sync
on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Radicle Binary
        run: |
          # Download the official binary directly
          wget https://files.radicle.xyz/latest/radicle-x86_64-unknown-linux-musl.tar.xz
          tar -xvf radicle-x86_64-unknown-linux-musl.tar.xz
          # Move it to a folder in the PATH
          sudo mv radicle-x86_64-unknown-linux-musl/bin/* /usr/local/bin/
          echo "Radicle version: $(rad --version)"

      - name: Authorize & Sync
        env:
          RAD_KEY: ${{ secrets.RAD_PRIVATE_KEY }}
          RAD_PASS: ${{ secrets.RAD_PASSPHRASE }}
        run: |
          mkdir -p ~/.radicle/keys
          echo "$RAD_KEY" > ~/.radicle/keys/radicle
          chmod 600 ~/.radicle/keys/radicle
          
          eval $(ssh-agent -s)
          # Using --stdin to log in as Curiousbeing9
          echo "$RAD_PASS" | rad auth --stdin --alias Curiousbeing9
          
          rad node start
          # Force sync the Kaspstore tracker
          rad sync rad:z2sjHzPsk9wmmpPm1F93tYT38yeYK --announce
