name: Radicle Cloud Sync
on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Radicle
        run: |
          curl -LsSf https://radicle.xyz/install | sh
          echo "$HOME/.radicle/bin" >> $GITHUB_PATH

      - name: Authorize & Sync
        env:
          RAD_KEY: ${{ secrets.RAD_PRIVATE_KEY }}
          RAD_PASS: ${{ secrets.RAD_PASSPHRASE }}
        run: |
          # 1. Setup the keys
          mkdir -p ~/.radicle/keys
          echo "$RAD_KEY" > ~/.radicle/keys/radicle
          chmod 600 ~/.radicle/keys/radicle
          
          # 2. Extract the Public Key (Radicle needs both files to unlock properly)
          ssh-keygen -y -f ~/.radicle/keys/radicle > ~/.radicle/keys/radicle.pub
          
          # 3. Start SSH Agent and Unlock the Identity (Removed --alias)
          eval $(ssh-agent -s)
          echo "$RAD_PASS" | rad auth --stdin
          
          # 4. Start the node and Sync your Kaspstore tracker
          rad node start
          rad sync rad:z2sjHzPsk9wmmpPm1F93tYT38yeYK --announce
