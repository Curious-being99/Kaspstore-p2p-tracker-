name: Radicle Cloud Sync
on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Radicle
        run: |
          # The -L flag forces curl to follow redirects, fixing the HTML error
          curl -LsSf https://radicle.xyz/install | sh
          echo "$HOME/.radicle/bin" >> $GITHUB_PATH

      - name: Authorize & Sync
        env:
          RAD_KEY: ${{ secrets.RAD_PRIVATE_KEY }}
          RAD_PASS: ${{ secrets.RAD_PASSPHRASE }}
        run: |
          mkdir -p ~/.radicle/keys
          echo "$RAD_KEY" > ~/.radicle/keys/radicle
          chmod 600 ~/.radicle/keys/radicle
          
          eval $(ssh-agent -s)
          echo "$RAD_PASS" | rad auth --stdin --alias Curiousbeing9
          
          rad node start
          rad sync rad:z2sjHzPsk9wmmpPm1F93tYT38yeYK --announce
